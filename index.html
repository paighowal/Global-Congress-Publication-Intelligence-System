const YEAR_STATS = {
  2022: { total: 931, congresses: 26, oncology: 75, cardiology: 119, neurology: 149, hematology: 9 },

  <!-- ── React component (compiled by Babel in-browser) ─────────────────── -->
  <script type="text/babel">
const { useState, useMemo } = React;

/**
 * GlobalPublicationPlan.jsx
 * Medical Congress Global Publication Plan — all years, all therapeutic areas.
 *
 * Data sourced live from congress_intel.db via context/planData.js
 * (regenerate with: python scripts/gen_jsx_data.py)
 *
 * Usage in React app:
 *   import GlobalPublicationPlan from "./context/GlobalPublicationPlan";
 */

// ── helpers ──────────────────────────────────────────────────────────────────
const CONGRESS_MAP = Object.fromEntries(CONGRESSES.map(c => [c.id, c]));
const EDITION_MAP  = Object.fromEntries(EDITIONS.map(e => [e.id, e]));
const YEARS        = [2022, 2023, 2024, 2025, 2026];
const QUARTERS     = ["Q1", "Q2", "Q3", "Q4"];
const Q_LABELS     = { Q1: "Jan – Mar", Q2: "Apr – Jun", Q3: "Jul – Sep", Q4: "Oct – Dec" };
const TA_MAP       = Object.fromEntries(THERAPEUTIC_AREAS.map(t => [t.id, t]));

function fmtDate(d) {
  if (!d) return "";
  const [y, m, day] = d.split("-");
  const months = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[+m]} ${+day}`;
}
function fmtDateRange(start, end) {
  if (!start) return "TBD";
  const s = fmtDate(start);
  const e = end ? fmtDate(end) : "";
  return e && e !== s ? `${s} – ${e}` : s;
}

const PUB_TYPE_COLORS = {
  abstract:   { bg: "#dbeafe", text: "#1e40af", border: "#3b82f6" },
  manuscript: { bg: "#f0fdf4", text: "#14532d", border: "#22c55e" },
};

// ── main component ────────────────────────────────────────────────────────────
function GlobalPublicationPlan() {
  const [year,           setYear]           = useState(2025);
  const [selAreas,       setSelAreas]       = useState([]);   // [] = all
  const [selQuarter,     setSelQuarter]     = useState(null); // null = all
  const [selCongress,    setSelCongress]    = useState(null);
  const [expandedId,     setExpandedId]     = useState(null);
  const [view,           setView]           = useState("calendar"); // calendar | table | summary
  const [search,         setSearch]         = useState("");
  const [hoveredEdition, setHoveredEdition] = useState(null);

  // ── filter logic ──────────────────────────────────────────────────────────
  const filtered = useMemo(() => {
    const s = search.toLowerCase().trim();
    return EDITIONS.filter(e => {
      if (e.year !== year) return false;
      const co = CONGRESS_MAP[e.congressId];
      if (!co) return false;
      if (selAreas.length > 0 && !co.areas.some(a => selAreas.includes(a))) return false;
      if (selQuarter && e.quarter !== selQuarter) return false;
      if (selCongress && e.congressId !== selCongress) return false;
      if (s) {
        const match =
          e.congressId.toLowerCase().includes(s) ||
          co.name.toLowerCase().includes(s) ||
          co.areas.some(a => a.toLowerCase().includes(s)) ||
          (e.location || "").toLowerCase().includes(s) ||
          e.pubs.some(p => p.title.toLowerCase().includes(s));
        if (!match) return false;
      }
      return true;
    });
  }, [year, selAreas, selQuarter, selCongress, search]);

  const byQuarter = useMemo(() => {
    const map = {};
    QUARTERS.forEach(q => { map[q] = []; });
    filtered.forEach(e => { if (map[e.quarter]) map[e.quarter].push(e); });
    return map;
  }, [filtered]);

  const totalPubs      = filtered.reduce((s, e) => s + e.pubCount, 0);
  const totalCongresses = filtered.length;
  const visiblePubs    = search
    ? filtered.reduce((s, e) => s + e.pubs.filter(p => p.title.toLowerCase().includes(search.toLowerCase())).length, 0)
    : totalPubs;

  function toggleArea(a) {
    setSelAreas(prev =>
      prev.includes(a) ? prev.filter(x => x !== a) : [...prev, a]
    );
  }

  const yearStat = YEAR_STATS[year] || {};

  // ─── calendar view ─────────────────────────────────────────────────────────
  const CalendarView = () => (
    <div style={{
      display: "grid",
      gridTemplateColumns: `repeat(${selQuarter ? 1 : 4}, 1fr)`,
      gap: 0, minHeight: "calc(100vh - 200px)",
    }}>
      {(selQuarter ? [selQuarter] : QUARTERS).map((q, qi) => {
        const editions = byQuarter[q] || [];
        const qPubs = editions.reduce((s, e) => s + e.pubCount, 0);
        return (
          <div key={q} style={{
            borderRight: qi < (selQuarter ? 0 : 3) ? "1px solid #e2e0d8" : "none",
            background: qi % 2 === 0 ? "#f8f7f4" : "#f3f2ef",
          }}>
            {/* Quarter header */}
            <div style={{
              padding: "12px 18px 8px",
              borderBottom: "2px solid #e2e0d8",
              background: "linear-gradient(180deg,#fff 0%,transparent 100%)",
              position: "sticky", top: 0, zIndex: 10,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "#1e293b" }}>{q} {year}</div>
                  <div style={{ fontSize: 9, color: "#94a3b8", fontFamily: "sans-serif", marginTop: 1 }}>
                    {Q_LABELS[q]} · {editions.length} congresses · {qPubs} pubs
                  </div>
                </div>
                <div style={{
                  fontSize: 18, fontWeight: 800, color: editions.length > 0 ? "#0ea5e9" : "#cbd5e1",
                  fontFamily: "sans-serif",
                }}>{editions.length}</div>
              </div>
            </div>

            {/* Congress cards */}
            <div style={{ padding: "12px 14px", display: "flex", flexDirection: "column", gap: 12 }}>
              {editions.length === 0 && (
                <div style={{ textAlign: "center", padding: "32px 16px", color: "#cbd5e1", fontFamily: "sans-serif", fontSize: 11 }}>
                  No congresses match filters
                </div>
              )}
              {editions.map(e => {
                const co = CONGRESS_MAP[e.congressId];
                if (!co) return null;
                const isExpanded = expandedId === e.id;
                const isHovered  = hoveredEdition === e.id;
                const primaryTA  = TA_MAP[co.primaryArea] || {};

                // Filter pubs if search active
                const visiblePubList = search
                  ? e.pubs.filter(p => p.title.toLowerCase().includes(search.toLowerCase()))
                  : e.pubs;

                return (
                  <div key={e.id} style={{
                    background: "#fff",
                    borderRadius: 10,
                    border: isHovered ? `1.5px solid ${co.color}66` : "1px solid #e2e0d8",
                    boxShadow: isHovered
                      ? `0 4px 12px ${co.color}22`
                      : "0 1px 3px rgba(0,0,0,0.06)",
                    overflow: "hidden",
                    transition: "all 0.15s",
                  }}
                    onMouseEnter={() => setHoveredEdition(e.id)}
                    onMouseLeave={() => setHoveredEdition(null)}
                  >
                    {/* Card header */}
                    <div
                      onClick={() => setExpandedId(isExpanded ? null : e.id)}
                      style={{
                        padding: "11px 14px",
                        borderBottom: isExpanded ? `1px solid ${co.color}22` : "none",
                        cursor: "pointer",
                        background: isExpanded ? `${co.color}08` : "#fff",
                      }}
                    >
                      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <div style={{
                            width: 30, height: 30, borderRadius: 7, flexShrink: 0,
                            background: `${co.color}18`, border: `1.5px solid ${co.color}44`,
                            display: "flex", alignItems: "center", justifyContent: "center",
                            fontSize: 15,
                          }}>
                            {co.icon}
                          </div>
                          <div>
                            <div style={{ fontSize: 13, fontWeight: 700, color: "#1e293b", lineHeight: 1.2 }}>
                              {co.acronym}
                            </div>
                            <div style={{ fontSize: 8, color: co.color, fontFamily: "sans-serif", fontWeight: 600, letterSpacing: "0.5px", textTransform: "uppercase", marginTop: 1 }}>
                              {co.primaryArea}
                            </div>
                          </div>
                        </div>
                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                          <div style={{
                            fontSize: 14, fontWeight: 800, color: e.pubCount > 0 ? co.color : "#cbd5e1",
                            fontFamily: "sans-serif", lineHeight: 1,
                          }}>
                            {e.pubCount}
                          </div>
                          <div style={{ fontSize: 7, color: "#94a3b8", fontFamily: "sans-serif" }}>
                            {isExpanded ? "▲" : "▼"} pubs
                          </div>
                        </div>
                      </div>

                      {/* Date + location */}
                      <div style={{ marginTop: 7, display: "flex", gap: 8, flexWrap: "wrap" }}>
                        <div style={{ fontSize: 9, color: "#475569", fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 3 }}>
                          <span style={{ opacity: 0.5 }}>📅</span>
                          {fmtDateRange(e.startDate, e.endDate)}
                        </div>
                        {e.location && (
                          <div style={{ fontSize: 9, color: "#475569", fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 3 }}>
                            <span style={{ opacity: 0.5 }}>📍</span>
                            {e.location}
                          </div>
                        )}
                      </div>

                      {/* Therapeutic area tags */}
                      <div style={{ marginTop: 6, display: "flex", gap: 3, flexWrap: "wrap" }}>
                        {co.areas.slice(0, 3).map(a => {
                          const at = TA_MAP[a] || { color: "#64748b" };
                          return (
                            <span key={a} style={{
                              fontSize: 7.5, padding: "1.5px 6px", borderRadius: 8,
                              background: `${at.color}14`, color: at.color,
                              border: `1px solid ${at.color}33`,
                              fontFamily: "sans-serif", fontWeight: 600,
                            }}>
                              {a}
                            </span>
                          );
                        })}
                      </div>
                    </div>

                    {/* Publication list — shown when expanded */}
                    {isExpanded && (
                      <div style={{ borderTop: `1px solid ${co.color}22` }}>
                        {visiblePubList.length === 0 ? (
                          <div style={{ padding: "12px 14px", color: "#94a3b8", fontFamily: "sans-serif", fontSize: 10, textAlign: "center" }}>
                            {search ? "No publications match search" : "No publications with abstracts"}
                          </div>
                        ) : (
                          visiblePubList.map((pub, pi) => {
                            const ptc = PUB_TYPE_COLORS[pub.type] || PUB_TYPE_COLORS.abstract;
                            return (
                              <div key={pi} style={{
                                padding: "8px 14px",
                                borderBottom: pi < visiblePubList.length - 1 ? "1px solid #f5f4f1" : "none",
                                borderLeft: `3px solid ${co.color}77`,
                              }}>
                                <div style={{ fontSize: 10, color: "#1e293b", lineHeight: 1.4 }}>
                                  {pub.title}
                                </div>
                                <div style={{ marginTop: 4, display: "flex", gap: 5, alignItems: "center" }}>
                                  <span style={{
                                    fontSize: 7.5, padding: "1px 5px", borderRadius: 4,
                                    background: ptc.bg, color: ptc.text,
                                    border: `1px solid ${ptc.border}55`,
                                    fontFamily: "sans-serif", fontWeight: 700,
                                    textTransform: "capitalize",
                                  }}>
                                    {pub.type}
                                  </span>
                                  {pub.area && (
                                    <span style={{
                                      fontSize: 7.5, color: "#64748b",
                                      fontFamily: "sans-serif",
                                    }}>
                                      {pub.area}
                                    </span>
                                  )}
                                  {pub.pmid && (
                                    <a
                                      href={`https://pubmed.ncbi.nlm.nih.gov/${pub.pmid}/`}
                                      target="_blank"
                                      rel="noopener noreferrer"
                                      onClick={e => e.stopPropagation()}
                                      style={{
                                        fontSize: 7.5, color: "#0ea5e9",
                                        fontFamily: "sans-serif", textDecoration: "none",
                                      }}
                                    >
                                      PMID:{pub.pmid} ↗
                                    </a>
                                  )}
                                </div>
                              </div>
                            );
                          })
                        )}
                        {!search && e.pubCount > e.pubs.length && (
                          <div style={{
                            padding: "7px 14px",
                            fontSize: 9, color: "#94a3b8", fontFamily: "sans-serif",
                            borderTop: "1px dashed #e2e0d8", textAlign: "center",
                          }}>
                            + {e.pubCount - e.pubs.length} more publications in database
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );

  // ─── table view ──────────────────────────────────────────────────────────
  const TableView = () => (
    <div style={{ padding: "20px 24px" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "sans-serif", fontSize: 12 }}>
        <thead>
          <tr style={{ borderBottom: "2px solid #e2e0d8" }}>
            {["Congress", "Full Name", "Quarter", "Dates", "Location", "Therapeutic Areas", "Publications"].map(h => (
              <th key={h} style={{
                padding: "8px 12px", textAlign: "left", fontSize: 10,
                color: "#64748b", letterSpacing: "0.5px", textTransform: "uppercase",
                fontWeight: 700, whiteSpace: "nowrap",
              }}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {filtered.sort((a, b) => a.quarter.localeCompare(b.quarter) || a.congressId.localeCompare(b.congressId)).map((e, i) => {
            const co = CONGRESS_MAP[e.congressId];
            if (!co) return null;
            return (
              <tr key={e.id} style={{
                borderBottom: "1px solid #f1f0ed",
                background: i % 2 === 0 ? "#fff" : "#fafaf8",
                transition: "background 0.1s",
              }}>
                <td style={{ padding: "8px 12px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                    <span style={{ fontSize: 14 }}>{co.icon}</span>
                    <span style={{ fontWeight: 700, color: co.color }}>{co.acronym}</span>
                  </div>
                </td>
                <td style={{ padding: "8px 12px", color: "#374151", maxWidth: 240 }}>
                  <div style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {co.name}
                  </div>
                </td>
                <td style={{ padding: "8px 12px" }}>
                  <span style={{
                    fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 6,
                    background: "#1e293b", color: "#94a3b8",
                  }}>{e.quarter}</span>
                </td>
                <td style={{ padding: "8px 12px", color: "#475569", whiteSpace: "nowrap" }}>
                  {fmtDateRange(e.startDate, e.endDate)}
                </td>
                <td style={{ padding: "8px 12px", color: "#475569" }}>{e.location || "—"}</td>
                <td style={{ padding: "8px 12px" }}>
                  <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                    {co.areas.map(a => {
                      const at = TA_MAP[a] || { color: "#64748b" };
                      return (
                        <span key={a} style={{
                          fontSize: 8, padding: "1px 5px", borderRadius: 6,
                          background: `${at.color}14`, color: at.color,
                          border: `1px solid ${at.color}33`, fontWeight: 600,
                        }}>{a}</span>
                      );
                    })}
                  </div>
                </td>
                <td style={{ padding: "8px 12px", textAlign: "center" }}>
                  <span style={{
                    fontSize: 14, fontWeight: 800,
                    color: e.pubCount > 0 ? co.color : "#cbd5e1",
                  }}>
                    {e.pubCount}
                  </span>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );

  // ─── summary: byArea computed at top level (no nested hooks) ─────────────
  const byArea = useMemo(() => {
    const map = {};
    filtered.forEach(e => {
      const co = CONGRESS_MAP[e.congressId];
      if (!co) return;
      co.areas.forEach(a => {
        if (!map[a]) map[a] = { congresses: 0, pubs: 0 };
        map[a].congresses++;
        map[a].pubs += e.pubCount;
      });
    });
    return Object.entries(map).sort((a, b) => b[1].pubs - a[1].pubs);
  }, [filtered]);

  // ─── summary view ─────────────────────────────────────────────────────────
  const SummaryView = () => {

    const byQtr = QUARTERS.map(q => {
      const es = filtered.filter(e => e.quarter === q);
      return { q, count: es.length, pubs: es.reduce((s, e) => s + e.pubCount, 0) };
    });

    return (
      <div style={{ padding: "24px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        {/* By Quarter */}
        <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2e0d8", padding: "20px", boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", letterSpacing: "1px", textTransform: "uppercase", marginBottom: 16, fontFamily: "sans-serif" }}>
            By Quarter — {year}
          </div>
          {byQtr.map(({ q, count, pubs }) => (
            <div key={q} style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#1e293b", fontFamily: "sans-serif" }}>
                  {q} <span style={{ color: "#94a3b8", fontWeight: 400, fontSize: 10 }}>{Q_LABELS[q]}</span>
                </div>
                <div style={{ fontSize: 11, fontFamily: "sans-serif", color: "#475569" }}>
                  {count} congresses · <strong style={{ color: "#0ea5e9" }}>{pubs}</strong> pubs
                </div>
              </div>
              <div style={{ height: 6, background: "#f1f0ed", borderRadius: 3, overflow: "hidden" }}>
                <div style={{
                  height: "100%",
                  width: `${totalPubs > 0 ? Math.round(pubs * 100 / totalPubs) : 0}%`,
                  background: "linear-gradient(90deg, #0ea5e9, #6366f1)",
                  borderRadius: 3,
                  transition: "width 0.3s",
                }} />
              </div>
            </div>
          ))}
        </div>

        {/* By Therapeutic Area */}
        <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2e0d8", padding: "20px", boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", letterSpacing: "1px", textTransform: "uppercase", marginBottom: 16, fontFamily: "sans-serif" }}>
            By Therapeutic Area — {year}
          </div>
          {byArea.map(([area, stats]) => {
            const at = TA_MAP[area] || { color: "#64748b", icon: "📋" };
            const maxPubs = byArea[0]?.[1]?.pubs || 1;
            return (
              <div key={area} style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "#1e293b", fontFamily: "sans-serif" }}>
                    <span>{at.icon}</span>
                    <span style={{ fontWeight: 600 }}>{area}</span>
                  </div>
                  <div style={{ fontSize: 10, fontFamily: "sans-serif", color: "#475569" }}>
                    {stats.congresses} congresses · <strong style={{ color: at.color }}>{stats.pubs}</strong> pubs
                  </div>
                </div>
                <div style={{ height: 5, background: "#f1f0ed", borderRadius: 3, overflow: "hidden" }}>
                  <div style={{
                    height: "100%",
                    width: `${Math.round(stats.pubs * 100 / maxPubs)}%`,
                    background: at.color,
                    borderRadius: 3,
                  }} />
                </div>
              </div>
            );
          })}
        </div>

        {/* Year-over-year comparison */}
        <div style={{ gridColumn: "1/-1", background: "#fff", borderRadius: 12, border: "1px solid #e2e0d8", padding: "20px", boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", letterSpacing: "1px", textTransform: "uppercase", marginBottom: 16, fontFamily: "sans-serif" }}>
            Year-over-Year Publication Volume
          </div>
          <div style={{ display: "flex", gap: 16, alignItems: "flex-end", height: 100 }}>
            {YEARS.map(y => {
              const ys = YEAR_STATS[y] || { total: 0 };
              const maxYear = Math.max(...YEARS.map(yr => (YEAR_STATS[yr] || {}).total || 0));
              const barH = maxYear > 0 ? Math.round(ys.total * 80 / maxYear) : 0;
              const isSel = y === year;
              return (
                <div
                  key={y}
                  onClick={() => setYear(y)}
                  style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", cursor: "pointer" }}
                >
                  <div style={{ fontSize: 10, fontFamily: "sans-serif", color: "#64748b", marginBottom: 4, fontWeight: isSel ? 700 : 400 }}>
                    {ys.total}
                  </div>
                  <div style={{
                    width: "100%", height: barH, minHeight: 4,
                    background: isSel ? "linear-gradient(180deg, #0ea5e9, #6366f1)" : "#e2e0d8",
                    borderRadius: "4px 4px 0 0",
                    transition: "all 0.2s",
                    border: isSel ? "1.5px solid #0ea5e9" : "none",
                  }} />
                  <div style={{
                    fontSize: 10, fontFamily: "sans-serif",
                    color: isSel ? "#0ea5e9" : "#94a3b8",
                    marginTop: 4, fontWeight: isSel ? 700 : 400,
                  }}>
                    {y}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  };

  // ─── render ──────────────────────────────────────────────────────────────
  return (
    <div style={{
      minHeight: "100vh",
      background: "#f8f7f4",
      fontFamily: "'Georgia', 'Times New Roman', serif",
      color: "#1a1a2e",
    }}>

      {/* ══ HEADER ══════════════════════════════════════════════════════════ */}
      <div style={{
        background: "linear-gradient(135deg, #0f172a 0%, #1e1b4b 60%, #0f172a 100%)",
        borderBottom: "3px solid #f59e0b",
        position: "relative", overflow: "hidden",
      }}>
        {/* grid bg */}
        <div style={{
          position: "absolute", inset: 0, opacity: 0.04,
          backgroundImage: "linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px)",
          backgroundSize: "40px 40px",
        }} />

        <div style={{ position: "relative", padding: "18px 28px 14px" }}>
          {/* Title row */}
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                <div style={{
                  width: 34, height: 34, borderRadius: 8, flexShrink: 0,
                  background: "linear-gradient(135deg,#f59e0b,#ef4444)",
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17,
                }}>⚕</div>
                <div style={{ fontSize: 9, fontFamily: "'Courier New',monospace", color: "#94a3b8", letterSpacing: "2px", textTransform: "uppercase" }}>
                  Medical Affairs · Publication Intelligence
                </div>
              </div>
              <h1 style={{ margin: 0, fontSize: 21, fontWeight: 700, color: "#f1f5f9", letterSpacing: "-0.3px", lineHeight: 1.2 }}>
                Global Publication Plan
              </h1>
              <div style={{ fontSize: 11, color: "#64748b", marginTop: 3, fontFamily: "sans-serif" }}>
                26 congresses · 15 therapeutic areas · {EDITIONS.length} congress editions · {EDITIONS.reduce((s,e)=>s+e.pubCount,0).toLocaleString()} tracked publications
              </div>
            </div>

            {/* Stat pills */}
            <div style={{ display: "flex", gap: 8, alignItems: "flex-start", flexShrink: 0 }}>
              {[
                { label: "Congresses",  value: totalCongresses, color: "#6366f1" },
                { label: "Publications", value: visiblePubs.toLocaleString(), color: "#0ea5e9" },
                { label: `Year ${year}`, value: yearStat.total?.toLocaleString() || "—", color: "#f59e0b" },
              ].map(s => (
                <div key={s.label} style={{
                  textAlign: "center",
                  background: "rgba(255,255,255,0.06)",
                  border: `1px solid ${s.color}44`,
                  borderRadius: 10, padding: "9px 14px",
                }}>
                  <div style={{ fontSize: 20, fontWeight: 700, color: s.color, lineHeight: 1 }}>{s.value}</div>
                  <div style={{ fontSize: 8, color: "#94a3b8", marginTop: 2, letterSpacing: "1px", textTransform: "uppercase", fontFamily: "sans-serif" }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* ── Filter row ────────────────────────────────────────────────── */}
          <div style={{ marginTop: 14, borderTop: "1px solid #1e293b", paddingTop: 12, display: "flex", flexWrap: "wrap", gap: 10, alignItems: "center" }}>

            {/* Year */}
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 9, color: "#64748b", fontFamily: "sans-serif", letterSpacing: "1px", textTransform: "uppercase" }}>Year</span>
              {YEARS.map(y => (
                <button key={y} onClick={() => setYear(y)} style={{
                  padding: "3px 10px", borderRadius: 20, border: "none", cursor: "pointer",
                  fontFamily: "sans-serif", fontSize: 10, fontWeight: 600,
                  background: year === y ? "#0ea5e9" : "transparent",
                  color: year === y ? "#fff" : "#64748b",
                  outline: year === y ? "none" : "1.5px solid #1e293b",
                  transition: "all 0.15s",
                }}>
                  {y}
                </button>
              ))}
            </div>

            <div style={{ width: 1, height: 20, background: "#1e293b" }} />

            {/* Quarter */}
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 9, color: "#64748b", fontFamily: "sans-serif", letterSpacing: "1px", textTransform: "uppercase" }}>Quarter</span>
              {QUARTERS.map(q => (
                <button key={q} onClick={() => setSelQuarter(selQuarter === q ? null : q)} style={{
                  padding: "3px 10px", borderRadius: 20, border: "none", cursor: "pointer",
                  fontFamily: "sans-serif", fontSize: 10, fontWeight: 600,
                  background: selQuarter === q ? "#1e40af" : "transparent",
                  color: selQuarter === q ? "#93c5fd" : "#64748b",
                  outline: selQuarter === q ? "none" : "1.5px solid #1e293b",
                  transition: "all 0.15s",
                }}>
                  {q}
                </button>
              ))}
            </div>

            <div style={{ width: 1, height: 20, background: "#1e293b" }} />

            {/* Therapeutic areas */}
            <div style={{ display: "flex", alignItems: "center", gap: 5, flexWrap: "wrap", flex: 1 }}>
              <span style={{ fontSize: 9, color: "#64748b", fontFamily: "sans-serif", letterSpacing: "1px", textTransform: "uppercase" }}>Area</span>
              {THERAPEUTIC_AREAS.map(ta => {
                const active = selAreas.includes(ta.id);
                return (
                  <button key={ta.id} onClick={() => toggleArea(ta.id)} style={{
                    display: "flex", alignItems: "center", gap: 4,
                    padding: "3px 9px", borderRadius: 20, border: "none", cursor: "pointer",
                    background: active ? `${ta.color}22` : "transparent",
                    color: active ? ta.color : "#475569",
                    fontFamily: "sans-serif", fontSize: 9.5, fontWeight: 600,
                    outline: active ? `1.5px solid ${ta.color}66` : "1.5px solid #1e293b",
                    transition: "all 0.15s",
                  }}>
                    <span style={{ fontSize: 9 }}>{ta.icon}</span>
                    {ta.label}
                  </button>
                );
              })}
              {selAreas.length > 0 && (
                <button onClick={() => setSelAreas([])} style={{
                  padding: "3px 9px", borderRadius: 20, border: "none", cursor: "pointer",
                  background: "transparent", color: "#ef4444",
                  fontFamily: "sans-serif", fontSize: 9, fontWeight: 700,
                  outline: "1.5px solid #ef444433",
                }}>
                  ✕ clear
                </button>
              )}
            </div>
          </div>

          {/* ── Second filter row: search + view ───────────────────────────── */}
          <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 10 }}>
            {/* Search */}
            <div style={{ position: "relative", flex: 1, maxWidth: 300 }}>
              <span style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)", fontSize: 11, color: "#475569", pointerEvents: "none" }}>🔍</span>
              <input
                type="text"
                placeholder="Search congress, area, publication title..."
                value={search}
                onChange={e => setSearch(e.target.value)}
                style={{
                  width: "100%", padding: "5px 10px 5px 28px",
                  borderRadius: 20, border: "1.5px solid #1e293b",
                  background: "rgba(255,255,255,0.06)", color: "#f1f5f9",
                  fontFamily: "sans-serif", fontSize: 10, outline: "none",
                  boxSizing: "border-box",
                }}
              />
            </div>

            {/* View toggle */}
            <div style={{ display: "flex", gap: 4 }}>
              {[["calendar","📅 Calendar"], ["table","📋 Table"], ["summary","📊 Summary"]].map(([v, label]) => (
                <button key={v} onClick={() => setView(v)} style={{
                  padding: "4px 12px", borderRadius: 20, border: "none", cursor: "pointer",
                  background: view === v ? "#0ea5e9" : "transparent",
                  color: view === v ? "#fff" : "#64748b",
                  fontFamily: "sans-serif", fontSize: 10, fontWeight: 600,
                  outline: view === v ? "none" : "1.5px solid #1e293b",
                  transition: "all 0.15s",
                }}>
                  {label}
                </button>
              ))}
            </div>

            {/* Filtered summary */}
            <div style={{ marginLeft: "auto", fontSize: 9, color: "#475569", fontFamily: "sans-serif" }}>
              {filtered.length}/{EDITIONS.filter(e => e.year === year).length} congresses ·{" "}
              {totalPubs.toLocaleString()} pubs
            </div>
          </div>
        </div>
      </div>

      {/* ══ MAIN CONTENT ════════════════════════════════════════════════════ */}
      {view === "calendar" && <CalendarView />}
      {view === "table"    && <TableView />}
      {view === "summary"  && <SummaryView />}

      {/* ══ FOOTER ══════════════════════════════════════════════════════════ */}
      <div style={{
        borderTop: "1px solid #e2e0d8", padding: "10px 28px",
        background: "#fff", display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap",
      }}>
        {THERAPEUTIC_AREAS.slice(0, 8).map(ta => (
          <div key={ta.id} style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 8, height: 8, borderRadius: "50%", background: ta.color, display: "inline-block" }} />
            <span style={{ fontSize: 9, color: "#64748b", fontFamily: "sans-serif" }}>{ta.label}</span>
          </div>
        ))}
        <div style={{ marginLeft: "auto", fontSize: 8, color: "#cbd5e1", fontFamily: "'Courier New',monospace" }}>
          Congress Intelligence System · Data as of May 2026 · {EDITIONS.reduce((s,e)=>s+e.pubCount,0).toLocaleString()} publications
        </div>
      </div>
    </div>
  );
}


// Mount
const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(GlobalPublicationPlan, null));

  </script>
</body>
</html>
